name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          mkdir -p dist/woo-broadcast-mailer
          rsync -a --exclude='.git' --exclude='.github' --exclude='.DS_Store' --exclude='LOCAL_*' ./ dist/woo-broadcast-mailer/
          cd dist
          zip -r woo-broadcast-mailer.zip woo-broadcast-mailer

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/woo-broadcast-mailer.zip
