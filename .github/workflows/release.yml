name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          mkdir -p dist/woo-broadcast-mailer
          rsync -a --filter=':- .gitignore' \
            --include='woo-broadcast-mailer.php' \
            --include='includes/***' \
            --include='assets/***' \
            --include='build/***' \
            --include='languages/***' \
            --include='readme.txt' \
            --include='LICENSE' \
            --include='uninstall.php' \
            --exclude='node_modules/' \
            --exclude='_dev/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='src/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='dist/' \
            --exclude='*' \
            ./ dist/woo-broadcast-mailer/
          cd dist
          zip -r woo-broadcast-mailer.zip woo-broadcast-mailer

      - name: Verify release zip
        run: |
          test ! -d dist/woo-broadcast-mailer/node_modules
          test ! -d dist/woo-broadcast-mailer/_dev
          test ! -d dist/woo-broadcast-mailer/.git
          test ! -d dist/woo-broadcast-mailer/.github
          test ! -d dist/woo-broadcast-mailer/src
          test ! -f dist/woo-broadcast-mailer/package.json
          test ! -f dist/woo-broadcast-mailer/package-lock.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/woo-broadcast-mailer.zip
